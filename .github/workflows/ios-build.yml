name: iOS Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-guardrails:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code with LFS
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Run CI guardrail tests
      run: |
        python3 .github/tests/test_ci_guardrails.py

  build:
    needs: ci-guardrails
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
    - name: Checkout code with LFS
      uses: actions/checkout@v4
      with:
        lfs: true
        fetch-depth: 0

    - name: Ensure LFS objects are downloaded
      run: |
        set -euo pipefail
        git lfs install --local
        git lfs pull
        echo "📋 LFS 文件列表:"
        git lfs ls-files || true

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Validate required SDK binaries
      run: |
        set -euo pipefail
        cd RestaurantIngredientManager/RestaurantIngredientManager
        REQUIRED_LIBS=("JCAPI.a" "JCLPAPI.a" "libSkiaRenderLibrary.a")
        for lib in "${REQUIRED_LIBS[@]}"; do
          if [ ! -f "$lib" ]; then
            echo "❌ 缺少 SDK 二进制文件: $lib"
            exit 1
          fi
          if head -n 1 "$lib" | grep -q "version https://git-lfs.github.com/spec/v1"; then
            echo "❌ $lib 仍是 Git LFS 指针文本，未下载真实二进制"
            exit 1
          fi
          echo "✅ $lib"
          file "$lib" || true
        done

    - name: Install xcodegen with retry
      run: |
        set -euo pipefail
        echo "📦 安装 xcodegen（带重试）..."
        attempt=1
        max_attempts=3
        until [ "$attempt" -gt "$max_attempts" ]; do
          if brew install xcodegen; then
            break
          fi
          if [ "$attempt" -eq "$max_attempts" ]; then
            echo "❌ xcodegen 安装失败，已重试 $max_attempts 次"
            exit 1
          fi
          echo "⚠️ xcodegen 安装失败，第 $attempt 次重试..."
          sleep $((attempt * 10))
          attempt=$((attempt + 1))
        done
        xcodegen --version

    - name: Generate Xcode project
      run: |
        set -euo pipefail
        cd RestaurantIngredientManager
        echo "🔨 生成 Xcode 项目文件..."

        if [ ! -f "project.yml" ]; then
          echo "❌ 错误: project.yml 文件不存在"
          exit 1
        fi

        xcodegen generate

        if [ ! -f "RestaurantIngredientManager.xcodeproj/project.pbxproj" ]; then
          echo "❌ 错误: 项目文件生成失败"
          exit 1
        fi

        FILE_SIZE=$(wc -c < "RestaurantIngredientManager.xcodeproj/project.pbxproj")
        echo "✅ 项目文件生成成功 (大小: $FILE_SIZE bytes)"

    - name: Install dependencies
      run: |
        set -euo pipefail
        cd RestaurantIngredientManager

    - name: Clean Build Cache
      run: |
        set -euo pipefail
        echo "🧹 清理构建缓存..."
        cd RestaurantIngredientManager
        
        # 清理Xcode构建缓存
        echo "📦 清理Xcode构建产物..."
        xcodebuild clean \
          -project RestaurantIngredientManager.xcodeproj \
          -scheme RestaurantIngredientManager \
          -configuration Release || echo "⚠️ clean命令失败（可能项目尚未构建过）"
        
        # 删除DerivedData
        echo "🗑️  删除DerivedData..."
        rm -rf ~/Library/Developer/Xcode/DerivedData/RestaurantIngredientManager-* || true
        
        # 删除ModuleCache
        echo "🗑️  删除ModuleCache..."
        rm -rf ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex/* || true
        
        # 删除本地build文件夹
        echo "🗑️  删除本地build文件夹..."
        rm -rf build/ || true
        
        echo "✅ 缓存清理完成"

    - name: Build project
      run: |
        set -euo pipefail
        cd RestaurantIngredientManager
        echo "🔨 开始构建项目..."

        set +e
        xcodebuild -project RestaurantIngredientManager.xcodeproj \
          -scheme RestaurantIngredientManager \
          -sdk iphoneos \
          -configuration Release \
          -archivePath $PWD/build/RestaurantIngredientManager.xcarchive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          -allowProvisioningUpdates \
          archive 2>&1 | tee build.log

        BUILD_EXIT_CODE=${PIPESTATUS[0]}
        set -e

        if [ $BUILD_EXIT_CODE -ne 0 ]; then
          echo ""
          echo "❌ ============================================"
          echo "❌ 构建失败！错误代码: $BUILD_EXIT_CODE"
          echo "❌ ============================================"
          echo ""
          echo "📋 所有错误信息:"
          grep -i "error:" build.log || echo "未找到 'error:' 标记"
          echo ""
          echo "⚠️  所有警告信息:"
          grep -i "warning:" build.log | head -20 || echo "未找到警告"
          echo ""
          echo "🔍 Swift 编译错误:"
          grep -A 3 "Swift Compiler Error" build.log || echo "未找到 Swift 编译错误"
          echo ""
          echo "🔍 链接错误:"
          grep -A 3 "Linker command failed" build.log || echo "未找到链接错误"
          echo ""
          echo "📄 完整构建日志已保存到 build.log"
          exit 1
        fi

        echo "✅ 构建成功！"

    - name: Upload Build Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: RestaurantIngredientManager/build.log
        retention-days: 7

    - name: Export IPA
      if: success()
      run: |
        set -euo pipefail
        cd RestaurantIngredientManager

        if [ ! -d "$PWD/build/RestaurantIngredientManager.xcarchive" ]; then
          echo "❌ Archive 不存在，跳过 IPA 导出"
          exit 1
        fi

        echo "📦 导出 IPA..."
        set +e
        xcodebuild -exportArchive \
          -archivePath $PWD/build/RestaurantIngredientManager.xcarchive \
          -exportOptionsPlist ExportOptions.plist \
          -exportPath $PWD/build \
          -allowProvisioningUpdates \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
        EXPORT_EXIT_CODE=$?
        set -e

        if [ "$EXPORT_EXIT_CODE" -ne 0 ]; then
          echo "⚠️  IPA 导出失败（可能由于代码签名问题）"
          echo "📱 但 .app 文件已在 archive 中生成"
          echo "📂 Archive 路径: $PWD/build/RestaurantIngredientManager.xcarchive"
        fi

    - name: Package unsigned IPA fallback
      if: success()
      run: |
        set -euo pipefail
        cd RestaurantIngredientManager

        if ls build/*.ipa >/dev/null 2>&1; then
          echo "✅ 已存在 xcodebuild 导出的 IPA，跳过兜底打包"
          ls -lh build/*.ipa
          exit 0
        fi

        APP_PATH="$PWD/build/RestaurantIngredientManager.xcarchive/Products/Applications/RestaurantIngredientManager.app"
        if [ ! -d "$APP_PATH" ]; then
          echo "❌ 未找到 archive 内的 .app，无法打包兜底 IPA"
          exit 1
        fi

        rm -rf "$PWD/build/Payload"
        mkdir -p "$PWD/build/Payload"
        cp -R "$APP_PATH" "$PWD/build/Payload/"
        cd "$PWD/build"
        ditto -c -k --sequesterRsrc --keepParent Payload RestaurantIngredientManager-unsigned.ipa
        rm -rf Payload
        echo "✅ 已生成兜底 IPA: $PWD/RestaurantIngredientManager-unsigned.ipa"
        ls -lh *.ipa

    - name: Verify IPA output
      if: success()
      run: |
        set -euo pipefail
        cd RestaurantIngredientManager
        if ! ls build/*.ipa >/dev/null 2>&1; then
          echo "❌ 未生成任何 IPA 文件"
          exit 1
        fi
        echo "✅ 可上传的 IPA 文件:"
        ls -lh build/*.ipa

    - name: Upload Archive
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: RestaurantIngredientManager-Archive
        path: RestaurantIngredientManager/build/RestaurantIngredientManager.xcarchive
        retention-days: 30

    - name: Upload IPA
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: RestaurantIngredientManager-IPA
        path: RestaurantIngredientManager/build/*.ipa
        retention-days: 30
        if-no-files-found: error
